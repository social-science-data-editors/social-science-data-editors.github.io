# ----------------------- #
#      Main Configs       #
# ----------------------- #

url: https://social-science-data-editors.github.io/
title: Social Science Data Editors
email: your-email@domain.com
author: SSDE
description: > # "Write an awesome description for your new site here. 
  The Social Science Data Editors work to improve reproducibility and transparency in social science research.
copyright: 'Copyright &copy; 2024 Social Science Data Editors. All Rights Reserved.'
credits: 'Credits: Landing Page is a free to use, open source Bootstrap theme created from <a href="https://github.com/swcool">swcool</a>.'
logo: /assets/ssde-logo.jpeg


# ----------------------- #
#    Jekyll & Plugins     #
# ----------------------- #

# Build settings
remote_theme: mmistakes/minimal-mistakes
# Outputting
paginate: 5 # amount of posts to show
paginate_path: /page:num/

include:
  - _pages

markdown: kramdown
permalink: pretty
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jemoji
  - jekyll-include-cache


# ----------------------- #
#   3rd Party Settings    #
# ----------------------- #

social:
  - title: github
    icon: github
    url: https://github.com/social-science-data-editors/

navigation:
  - title: Home
    url: /
  - title: Blog
    url: /posts/
  - title: DCAS
    url: '#dcas'
  - title: README
    url: '#readme'
  - title: Guidance
    url: '#guidance'
  - title: Reference
    url: '/reference'
  - title: Contact
    url: '#contact'

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
  # _front
  - scope:
      path: "_front"
      type: pages

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/